<h1 mat-dialog-title>{{ 'desc.logInfo' | translate }}</h1>
<div mat-dialog-content class="app-oh app-oa-y"> 
  @for (d of data; track d) {
    <strong>{{ d.title | translate }}</strong>
    <pre class="app-ws-pw">{{ d.content }}</pre>
    <hr/>
  }
</div>
<div mat-dialog-actions cdkFocusRegionstart>
  <button matButton="filled" [mat-dialog-close]="'close'" >{{ 'button.close' | translate }}</button>
</div>
